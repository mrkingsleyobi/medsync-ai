apiVersion: apps/v1
kind: Deployment
metadata:
  name: medisync-redis
  namespace: medisync-prod
  labels:
    app: medisync-redis
spec:
  replicas: 3
  selector:
    matchLabels:
      app: medisync-redis
  template:
    metadata:
      labels:
        app: medisync-redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        command:
        - "redis-server"
        - "--appendonly"
        - "yes"
        - "--requirepass"
        - "$(REDIS_PASSWORD)"
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: medisync-redis-secrets
              key: redis-password
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: redis-storage
          mountPath: /data
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: redis-storage
        persistentVolumeClaim:
          claimName: redis-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: medisync-redis-service
  namespace: medisync-prod
  labels:
    app: medisync-redis
spec:
  selector:
    app: medisync-redis
  ports:
  - protocol: TCP
    port: 6379
    targetPort: 6379

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: medisync-prod
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---
apiVersion: v1
kind: Secret
metadata:
  name: medisync-redis-secrets
  namespace: medisync-prod
type: Opaque
data:
  redis-password: eW91ci1zZWN1cmUtcmVkaXMtcGFzc3dvcmQ=