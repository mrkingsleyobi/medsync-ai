apiVersion: v1
kind: Secret
metadata:
  name: medisync-secrets
  namespace: medisync-prod
type: Opaque
data:
  # These would be base64 encoded in a real deployment
  # echo -n "your-database-url" | base64
  database-url: eW91ci1kYXRhYmFzZS11cmw=
  jwt-secret: eW91ci1qd3Qtc2VjcmV0
  api-key: eW91ci1hcGkta2V5
  encryption-key: eW91ci1lbmNyeXB0aW9uLWtleQ==

---
apiVersion: v1
kind: Secret
metadata:
  name: medisync-tls
  namespace: medisync-prod
type: kubernetes.io/tls
data:
  # These would contain actual TLS certificate data
  tls.crt: eW91ci1jZXJ0aWZpY2F0ZS1kYXRh
  tls.key: eW91ci1jZXJ0aWZpY2F0ZS1rZXktZGF0YQ==