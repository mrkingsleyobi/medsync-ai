apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: medisync-monitor
  namespace: medisync-prod
  labels:
    app: medisync-platform
spec:
  selector:
    matchLabels:
      app: medisync-platform
  endpoints:
  - port: api
    path: /metrics
    interval: 30s
  - port: decision-support
    path: /metrics
    interval: 30s
  - port: patient-communication
    path: /metrics
    interval: 30s
  - port: iot-wearable
    path: /metrics
    interval: 30s
  - port: admin-monitoring
    path: /metrics
    interval: 30s
  - port: research-integration
    path: /metrics
    interval: 30s
  - port: healthcare-integration
    path: /metrics
    interval: 30s

---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: medisync-alerts
  namespace: medisync-prod
spec:
  groups:
  - name: medisync-platform.rules
    rules:
    # Platform Health Alerts
    - alert: PlatformDown
      expr: up{job="medisync-platform"} == 0
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "MediSync Platform is down"
        description: "Platform has been down for more than 2 minutes"

    # Service Specific Alerts
    - alert: APIDown
      expr: up{job="medisync-platform", port="3000"} == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Main API is down"
        description: "Main API service is not responding"

    - alert: DecisionSupportDown
      expr: up{job="medisync-platform", port="3001"} == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Clinical Decision Support service is down"
        description: "Clinical Decision Support service is not responding"

    - alert: HighErrorRate
      expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High error rate"
        description: "Error rate has been above 5% for 5 minutes"

    - alert: HighLatency
      expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High API latency"
        description: "95th percentile latency has been above 2 seconds for 5 minutes"

    # Healthcare Specific Alerts
    - alert: DecisionConfidenceLow
      expr: medisync_decision_confidence < 0.8
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "Low decision confidence"
        description: "Clinical decision confidence has been below 0.8 for 10 minutes"

    - alert: DeviceConnectionIssues
      expr: medisync_device_connection_failures > 10
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Device connection issues"
        description: "Multiple device connection failures detected"

    # Resource Alerts
    - alert: HighMemoryUsage
      expr: (container_memory_usage_bytes{container!="POD", namespace="medisync-prod"} / container_spec_memory_limit_bytes{container!="POD", namespace="medisync-prod"}) > 0.85
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High memory usage"
        description: "Container memory usage is above 85%"

    - alert: HighCPULoad
      expr: rate(container_cpu_usage_seconds_total{container!="POD", namespace="medisync-prod"}[5m]) > 0.8
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High CPU load"
        description: "Container CPU usage is above 80%"