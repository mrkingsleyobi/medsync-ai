apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: medisync-mongodb
  namespace: medisync-prod
  labels:
    app: medisync-mongodb
spec:
  serviceName: medisync-mongodb
  replicas: 3
  selector:
    matchLabels:
      app: medisync-mongodb
  template:
    metadata:
      labels:
        app: medisync-mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:5.0
        ports:
        - containerPort: 27017
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          valueFrom:
            secretKeyRef:
              name: medisync-db-secrets
              key: mongodb-root-username
        - name: MONGO_INITDB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: medisync-db-secrets
              key: mongodb-root-password
        - name: MONGO_INITDB_DATABASE
          value: "medisync"
        resources:
          requests:
            memory: "1Gi"
            cpu: "1000m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        volumeMounts:
        - name: mongodb-storage
          mountPath: /data/db
        livenessProbe:
          exec:
            command:
            - mongo
            - --eval
            - "db.adminCommand('ping')"
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - mongo
            - --eval
            - "db.adminCommand('ping')"
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: mongodb-storage
        persistentVolumeClaim:
          claimName: mongodb-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: medisync-mongodb-service
  namespace: medisync-prod
  labels:
    app: medisync-mongodb
spec:
  selector:
    app: medisync-mongodb
  ports:
  - protocol: TCP
    port: 27017
    targetPort: 27017
  clusterIP: None

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongodb-pvc
  namespace: medisync-prod
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi

---
apiVersion: v1
kind: Secret
metadata:
  name: medisync-db-secrets
  namespace: medisync-prod
type: Opaque
data:
  mongodb-root-username: bW9uZ29kYg==
  mongodb-root-password: eW91ci1zZWN1cmUtbW9uZ29kYi1wYXNzd29yZA==