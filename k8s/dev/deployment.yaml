apiVersion: apps/v1
kind: Deployment
metadata:
  name: medisync-api
  namespace: medisync-dev
  labels:
    app: medisync-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: medisync-api
  template:
    metadata:
      labels:
        app: medisync-api
    spec:
      containers:
      - name: medisync-api
        image: medisync/medisync-api:latest
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: "development"
        - name: PORT
          value: "3000"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5